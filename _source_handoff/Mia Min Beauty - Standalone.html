<style>/* ============ Mia Min Beauty — Reimagined ============ */
/* Palettes set via [data-palette] on <html> */

:root {
  /* Type */
  --font-grotesk: 'Neue Haas Grotesk Text Pro', 'Inter Tight', 'Söhne', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --font-serif: 'GT Sectra', 'Canela', 'Tiempos Headline', 'Georgia', serif;
  --font-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;

  --radius-sm: 6px;
  --radius-md: 14px;
  --radius-lg: 22px;
  --radius-xl: 32px;

  /* Easing */
  --ease-out: cubic-bezier(.2,.7,.2,1);
  --ease-swift: cubic-bezier(.4,0,.2,1);
}

/* ========== PALETTE: OCEAN (default) ========== */
/* dewy nude + blush with cool ocean accent */
:root, [data-palette="ocean"] {
  --bg: #F6EEE7;
  --bg-2: #EEE2D6;
  --bg-3: #E4D2C1;
  --surface: #FFFBF7;
  --ink: #1B1411;
  --ink-2: #4A3E37;
  --ink-3: #8A7A6E;
  --line: #D9C7B5;
  --line-soft: #E9DCCD;
  --accent: #2C4B5A;          /* deep ocean */
  --accent-2: #7FA0AC;         /* mist ocean */
  --accent-3: #C7D9DE;         /* pale ocean */
  --blush: #E8B7A6;
  --blush-2: #D98E78;
  --gold: #B88746;
  --grad-a: #F6D9C8;
  --grad-b: #C7D9DE;
  --grad-c: #F6EEE7;
}

/* ========== PALETTE: BLUSH ========== */
[data-palette="blush"] {
  --bg: #FBE8E0;
  --bg-2: #F5D4C4;
  --bg-3: #EBB9A5;
  --surface: #FFF6F1;
  --ink: #2A1613;
  --ink-2: #5A342C;
  --ink-3: #8E5E52;
  --line: #E7C1B0;
  --line-soft: #F1D5C6;
  --accent: #8B3A2D;
  --accent-2: #C76A55;
  --accent-3: #F3C4B2;
  --blush: #E8B7A6;
  --blush-2: #D98E78;
  --gold: #A56B2E;
  --grad-a: #FBDCCB;
  --grad-b: #F4B9A1;
  --grad-c: #FFEBDF;
}

/* ========== PALETTE: NOIR ========== */
[data-palette="noir"] {
  --bg: #0F0D0B;
  --bg-2: #1A1714;
  --bg-3: #262220;
  --surface: #141210;
  --ink: #F4EBDF;
  --ink-2: #D4C4B1;
  --ink-3: #8E7E6E;
  --line: #2E2822;
  --line-soft: #1E1A17;
  --accent: #D4A25E;
  --accent-2: #E8C089;
  --accent-3: #4A3A26;
  --blush: #D98E78;
  --blush-2: #B86854;
  --gold: #D4A25E;
  --grad-a: #2A1F18;
  --grad-b: #1A1410;
  --grad-c: #0F0D0B;
}

/* ========== PALETTE: SAGE ========== */
[data-palette="sage"] {
  --bg: #EFEDE2;
  --bg-2: #E2DFD0;
  --bg-3: #CFCCB9;
  --surface: #F7F5ED;
  --ink: #1C1F17;
  --ink-2: #43493C;
  --ink-3: #7B8273;
  --line: #CAC6B3;
  --line-soft: #DDD9C6;
  --accent: #3E5240;
  --accent-2: #7A8F78;
  --accent-3: #C8D2BF;
  --blush: #E2B4A2;
  --blush-2: #C98872;
  --gold: #A67C3E;
  --grad-a: #D8E0CE;
  --grad-b: #EFE3D3;
  --grad-c: #F7F5ED;
}

/* ========== PALETTE: SAND ========== */
[data-palette="sand"] {
  --bg: #F1E6D4;
  --bg-2: #E4D4BA;
  --bg-3: #D1BB99;
  --surface: #F9F0E0;
  --ink: #2A1F11;
  --ink-2: #5A4630;
  --ink-3: #8B7555;
  --line: #D6C1A0;
  --line-soft: #E7D6B8;
  --accent: #6A4422;
  --accent-2: #B5885A;
  --accent-3: #EBD5AD;
  --blush: #E4B296;
  --blush-2: #C8855F;
  --gold: #B5885A;
  --grad-a: #EBD5AD;
  --grad-b: #F3DCBA;
  --grad-c: #F9F0E0;
}

/* ========== TYPOGRAPHY variants ========== */
/* default grotesk */
[data-type="grotesk"] {
  --display-font: var(--font-grotesk);
  --display-weight: 500;
  --display-tracking: -0.03em;
  --body-font: var(--font-grotesk);
  --accent-font: var(--font-serif);
}

[data-type="serif-mix"] {
  --display-font: var(--font-serif);
  --display-weight: 400;
  --display-tracking: -0.02em;
  --body-font: var(--font-grotesk);
  --accent-font: var(--font-serif);
}

[data-type="mono-accent"] {
  --display-font: var(--font-grotesk);
  --display-weight: 600;
  --display-tracking: -0.04em;
  --body-font: var(--font-grotesk);
  --accent-font: var(--font-mono);
}

/* ========== BASE ========== */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--body-font, var(--font-grotesk));
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

/* Airy vs Compact density */
[data-density="airy"] { --sec-py: 140px; --block-gap: 40px; }
[data-density="compact"] { --sec-py: 80px; --block-gap: 24px; }

a { color: inherit; text-decoration: none; }

.display {
  font-family: var(--display-font, var(--font-grotesk));
  font-weight: var(--display-weight, 500);
  letter-spacing: var(--display-tracking, -0.03em);
  line-height: 0.95;
}
.serif-italic { font-family: var(--font-serif); font-style: italic; font-weight: 400; }
.mono { font-family: var(--font-mono); letter-spacing: 0; }

/* ========== LAYOUT ========== */
.page {
  min-height: 100vh;
  position: relative;
}
.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 48px;
}
@media (max-width: 720px) {
  .container { padding: 0 20px; }
}
section { padding: var(--sec-py, 140px) 0; }

/* ========== NAV ========== */
.nav {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(18px) saturate(1.1);
  -webkit-backdrop-filter: blur(18px) saturate(1.1);
  background: color-mix(in srgb, var(--bg) 72%, transparent);
  border-bottom: 1px solid color-mix(in srgb, var(--line) 40%, transparent);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 72px;
}
.nav-logo {
  font-family: var(--accent-font);
  font-style: italic;
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 10px;
}
.nav-logo .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
}
.nav-links {
  display: flex; gap: 36px;
  font-size: 14px;
  color: var(--ink-2);
}
.nav-links a {
  position: relative;
  transition: color .2s;
}
.nav-links a:hover { color: var(--ink); }
.nav-cta {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 10px 18px;
  background: var(--ink);
  color: var(--surface);
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  transition: transform .2s var(--ease-out), background .2s;
}
.nav-cta:hover { transform: translateY(-1px); }
.nav-cta .pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: #6AD49B;
  box-shadow: 0 0 0 0 rgba(106,212,155,.7);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(106,212,155,.7); }
  70% { box-shadow: 0 0 0 6px rgba(106,212,155,0); }
  100% { box-shadow: 0 0 0 0 rgba(106,212,155,0); }
}
@media (max-width: 820px) {
  .nav-links { display: none; }
}

/* ========== BUTTONS ========== */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 22px;
  border: none; border-radius: 999px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: transform .2s var(--ease-out), background .2s, color .2s, border-color .2s;
  letter-spacing: 0.01em;
}
.btn-primary {
  background: var(--ink);
  color: var(--surface);
}
.btn-primary:hover { transform: translateY(-1px); }
.btn-ghost {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--line);
}
.btn-ghost:hover { border-color: var(--ink); }
.btn-accent {
  background: var(--accent);
  color: #fff;
}

/* ========== HERO ========== */
.hero { position: relative; padding-top: 60px; padding-bottom: 60px; }

/* blobs */
.hero-blobs {
  position: absolute; inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.55;
  mix-blend-mode: multiply;
}
[data-palette="noir"] .blob { mix-blend-mode: screen; opacity: 0.35; }
.blob-1 { width: 520px; height: 520px; background: var(--grad-a); top: -120px; left: -140px; }
.blob-2 { width: 440px; height: 440px; background: var(--grad-b); top: 10%; right: -120px; }
.blob-3 { width: 380px; height: 380px; background: var(--blush); bottom: -180px; left: 30%; opacity: 0.35; }

.hero-inner {
  position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: stretch;
}
.hero-text {
  display: flex; flex-direction: column;
  justify-content: space-between;
  gap: 36px;
  padding-top: 40px;
}
.eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.22em;
  color: var(--ink-3);
}
.eyebrow::before {
  content: ""; display: block; width: 24px; height: 1px;
  background: var(--ink-3);
}
.hero h1 {
  margin: 24px 0 0;
  font-size: clamp(56px, 7.2vw, 104px);
  letter-spacing: -0.035em;
  line-height: 0.92;
}
.hero h1 em {
  font-family: var(--accent-font);
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.hero-sub {
  max-width: 440px;
  font-size: 17px;
  color: var(--ink-2);
  line-height: 1.55;
  margin-top: 20px;
}
.hero-meta {
  display: flex; gap: 40px; flex-wrap: wrap;
  border-top: 1px solid var(--line-soft);
  padding-top: 28px;
  margin-top: auto;
}
.hero-meta .stat {
  display: flex; flex-direction: column; gap: 2px;
}
.hero-meta .num {
  font-family: var(--display-font);
  font-size: 36px;
  letter-spacing: -0.02em;
}
.hero-meta .lbl {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-3);
}

.hero-image-wrap {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: visible;
  min-height: 560px;
  display: flex; flex-direction: column;
}

.hero-image {
  position: relative;
  flex: 1;
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: linear-gradient(135deg, var(--blush) 0%, var(--accent-3) 100%);
  isolation: isolate;
}
.hero-image::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.3), transparent 55%);
}
/* SVG brow illustration */
.brow-svg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
}

/* Image tags over hero */
.hero-tag {
  position: absolute;
  background: color-mix(in srgb, var(--surface) 92%, transparent);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid var(--line-soft);
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 12px;
  color: var(--ink);
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 8px 30px rgba(0,0,0,.06);
}
.hero-tag.t1 { top: 40px; left: 40px; }
.hero-tag.t2 { bottom: 40px; right: 40px; }
.hero-tag .dot-g { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

/* ========== HERO LAYOUT VARIANTS ========== */
[data-hero="split"] .hero-inner { grid-template-columns: 1fr 1fr; }

[data-hero="full-bleed"] .hero-inner { grid-template-columns: 1fr; }
[data-hero="full-bleed"] .hero-text {
  padding: 140px 40px;
  align-items: center;
  text-align: center;
  position: relative;
  z-index: 2;
  color: #fff;
  text-shadow: 0 2px 24px rgba(0,0,0,0.35);
}
[data-hero="full-bleed"] .hero-text .eyebrow { color: #fff; }
[data-hero="full-bleed"] .hero-text .eyebrow::before { background: rgba(255,255,255,0.7); }
[data-hero="full-bleed"] .hero-text .display,
[data-hero="full-bleed"] .hero-text .display em { color: #fff; }
[data-hero="full-bleed"] .hero-sub { margin-left: auto; margin-right: auto; color: #fff; }
[data-hero="full-bleed"] .hero-meta { justify-content: center; }
[data-hero="full-bleed"] .hero-meta .num { color: #fff; }
[data-hero="full-bleed"] .hero-meta .lbl { color: rgba(255,255,255,0.8); }
[data-hero="full-bleed"] .hero-image-wrap { display: none; }
[data-hero="full-bleed"] .hero { min-height: 80vh; padding: 0; overflow: hidden; }
[data-hero="full-bleed"] .hero-blobs { display: none; }

[data-hero="full-bleed"] .hero::after {
  content: "";
  position: absolute; inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 1;
}
[data-hero="full-bleed"] .hero .container { position: relative; z-index: 2; }

[data-hero="ambient"] .hero-inner { grid-template-columns: 1fr; }
[data-hero="ambient"] .hero-text { padding-top: 140px; max-width: 800px; margin: 0 auto; text-align: center; }
[data-hero="ambient"] .hero-image-wrap { display: none; }
[data-hero="ambient"] .hero-sub { margin-left: auto; margin-right: auto; }
[data-hero="ambient"] .hero-meta { justify-content: center; }

@media (max-width: 900px) {
  .hero-inner { grid-template-columns: 1fr !important; }
  .hero-image-wrap { display: block; min-height: 440px; }
  [data-hero="ambient"] .hero-image-wrap,
  [data-hero="full-bleed"] .hero-image-wrap { display: none; }
}

/* ========== SECTIONS ========== */
.section-header {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 60px;
  margin-bottom: 80px;
  align-items: end;
}
.section-header h2 {
  margin: 16px 0 0;
  font-size: clamp(42px, 5vw, 72px);
  letter-spacing: -0.03em;
  line-height: 0.98;
}
.section-header h2 em {
  font-family: var(--accent-font);
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.section-header .lead {
  font-size: 18px;
  color: var(--ink-2);
  max-width: 480px;
}
@media (max-width: 900px) {
  .section-header { grid-template-columns: 1fr; gap: 24px; }
}

/* ========== SERVICES ========== */
.services-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.service-card {
  background: var(--surface);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  padding: 40px;
  display: flex; flex-direction: column;
  gap: 24px;
  transition: border-color .2s, transform .3s var(--ease-out);
  position: relative;
  overflow: hidden;
}
.service-card:hover { border-color: var(--line); transform: translateY(-2px); }
.service-card .cat {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--ink-3);
}
.service-card h3 {
  margin: 0;
  font-size: 40px;
  letter-spacing: -0.025em;
  font-family: var(--display-font);
  font-weight: var(--display-weight);
  line-height: 1;
}
.service-card h3 em {
  font-family: var(--accent-font);
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.service-card p {
  color: var(--ink-2);
  font-size: 15px;
  line-height: 1.55;
  margin: 0;
}
.service-variants {
  display: flex; flex-direction: column; gap: 12px;
  border-top: 1px solid var(--line-soft);
  padding-top: 20px;
}
.service-variants .row {
  display: flex; justify-content: space-between; align-items: baseline;
  gap: 12px;
}
.service-variants .name { font-size: 14px; }
.service-variants .price {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--ink-2);
}
.service-ask {
  display: inline-flex; align-items: center; gap: 8px;
  align-self: flex-start;
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent);
  cursor: pointer;
  background: transparent; border: none;
  padding: 0;
  transition: gap .2s;
}
.service-ask:hover { gap: 12px; }
.service-ask svg { width: 14px; height: 14px; }

@media (max-width: 820px) {
  .services-grid { grid-template-columns: 1fr; }
}

/* ========== PROCESS TIMELINE ========== */
.process {
  background: var(--bg-2);
  border-radius: var(--radius-xl);
  padding: 80px 60px;
  margin: 40px 0;
}
.process-steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
  margin-top: 60px;
}
.process-step {
  position: relative;
}
.process-step .no {
  font-family: var(--accent-font);
  font-style: italic;
  font-size: 48px;
  color: var(--accent);
  line-height: 1;
  font-weight: 400;
}
.process-step h4 {
  font-size: 20px;
  letter-spacing: -0.01em;
  margin: 16px 0 8px;
  font-family: var(--display-font);
  font-weight: var(--display-weight);
}
.process-step p {
  color: var(--ink-2);
  font-size: 14px;
  margin: 0;
}
@media (max-width: 820px) {
  .process { padding: 48px 24px; }
  .process-steps { grid-template-columns: 1fr 1fr; gap: 32px; }
}

/* ========== ABOUT ========== */
.about {
  display: grid;
  grid-template-columns: 0.65fr 1.2fr;
  gap: 80px;
  align-items: center;
}
.about-portrait {
  aspect-ratio: 4/5;
  max-width: 65%;
  background: linear-gradient(160deg, var(--blush), var(--accent-3));
  border-radius: var(--radius-lg);
  position: relative;
  overflow: hidden;
}
.about-portrait::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 40% 30%, rgba(255,255,255,0.35), transparent 55%);
}
.about-signature {
  position: absolute; bottom: 24px; left: 24px;
  font-family: var(--accent-font);
  font-style: italic;
  font-size: 32px;
  color: var(--surface);
  font-weight: 400;
  text-shadow: 0 2px 20px rgba(0,0,0,0.15);
}
.about h2 {
  margin: 0 0 24px;
  font-size: clamp(36px, 4vw, 56px);
  letter-spacing: -0.03em;
  line-height: 1;
}
.about h2 em { font-family: var(--accent-font); font-style: italic; color: var(--accent); font-weight: 400; }
.about p {
  color: var(--ink-2);
  font-size: 16px;
  line-height: 1.65;
  margin: 0 0 16px;
}
.about .quote {
  font-family: var(--accent-font);
  font-style: italic;
  font-size: 24px;
  color: var(--ink);
  line-height: 1.3;
  margin: 32px 0;
  padding-left: 24px;
  border-left: 2px solid var(--accent);
}
.about-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-top: 36px;
  padding-top: 32px;
  border-top: 1px solid var(--line-soft);
}
.about-stats .num {
  font-family: var(--display-font);
  font-size: 32px;
  letter-spacing: -0.02em;
}
.about-stats .lbl {
  font-size: 12px; color: var(--ink-3);
  text-transform: uppercase; letter-spacing: 0.15em;
}
@media (max-width: 900px) {
  .about { grid-template-columns: 1fr; gap: 40px; }
}

/* ========== GALLERY (Instagram link) ========== */
.gallery {
  background: var(--ink);
  color: var(--bg);
  border-radius: var(--radius-xl);
  padding: 80px 60px;
  position: relative;
  overflow: hidden;
}
[data-palette="noir"] .gallery { background: var(--bg-3); color: var(--ink); }
.gallery-head {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 40px;
  align-items: end;
  margin-bottom: 48px;
}
.gallery h2 {
  font-size: clamp(40px, 5vw, 64px);
  letter-spacing: -0.03em;
  margin: 0;
  line-height: 0.98;
}
.gallery h2 em { font-family: var(--accent-font); font-style: italic; color: var(--blush); font-weight: 400; }
.gallery .handle {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--bg-2);
  text-align: right;
}
.insta-tiles {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
}
.tile {
  aspect-ratio: 1/1;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--blush), var(--accent-2));
  position: relative;
  overflow: hidden;
  transition: transform .3s var(--ease-out);
}
.tile:hover { transform: scale(1.03); }
.tile::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.25), transparent 55%);
}
.tile svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.insta-cta {
  display: inline-flex; align-items: center; gap: 12px;
  margin-top: 40px;
  padding: 16px 24px;
  background: var(--surface);
  color: var(--ink);
  border-radius: 999px;
  font-weight: 500;
  transition: transform .2s var(--ease-out);
}
.insta-cta:hover { transform: translateY(-2px); }
@media (max-width: 820px) {
  .gallery { padding: 48px 24px; }
  .insta-tiles { grid-template-columns: repeat(3, 1fr); }
  .gallery-head { grid-template-columns: 1fr; }
}

/* ========== FAQ ========== */
.faq-wrap {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
}
.faq-list {
  display: flex; flex-direction: column;
  border-top: 1px solid var(--line-soft);
}
.faq-item {
  border-bottom: 1px solid var(--line-soft);
  padding: 24px 0;
  cursor: pointer;
}
.faq-q {
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px;
  font-size: 18px;
  font-weight: 500;
}
.faq-q .plus {
  font-family: var(--font-mono);
  color: var(--accent);
  transition: transform .2s;
  font-size: 20px;
  font-weight: 300;
}
.faq-item.open .plus { transform: rotate(45deg); }
.faq-a {
  max-height: 0;
  overflow: hidden;
  color: var(--ink-2);
  font-size: 15px;
  line-height: 1.6;
  transition: max-height .3s var(--ease-out), padding-top .3s var(--ease-out);
}
.faq-item.open .faq-a {
  max-height: 400px;
  padding-top: 12px;
}
.faq-ask-cta {
  background: var(--bg-2);
  border: 1px solid var(--line-soft);
  border-radius: var(--radius-lg);
  padding: 36px;
  position: sticky;
  top: 100px;
  align-self: start;
}
.faq-ask-cta h4 {
  font-family: var(--display-font);
  font-size: 26px;
  margin: 16px 0 8px;
  letter-spacing: -0.02em;
}
.faq-ask-cta h4 em { font-family: var(--accent-font); font-style: italic; color: var(--accent); font-weight: 400; }
.faq-ask-cta p {
  color: var(--ink-2);
  font-size: 14px;
  margin: 0 0 20px;
}
.faq-ask-cta .suggestions {
  display: flex; flex-direction: column; gap: 8px;
}
.faq-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--line-soft);
  border-radius: 999px;
  font-size: 13px;
  color: var(--ink);
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: border-color .2s, background .2s;
}
.faq-chip:hover { border-color: var(--accent); background: var(--bg); }
.faq-chip svg { width: 12px; height: 12px; opacity: 0.5; }
@media (max-width: 900px) {
  .faq-wrap { grid-template-columns: 1fr; }
  .faq-ask-cta { position: static; }
}

/* ========== CONTACT ========== */
.contact {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  padding: 80px 0;
  border-top: 1px solid var(--line-soft);
}
.contact h2 {
  font-size: clamp(40px, 5vw, 64px);
  margin: 0 0 32px;
  letter-spacing: -0.03em;
  line-height: 0.98;
}
.contact-info { display: flex; flex-direction: column; gap: 24px; }
.contact-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 16px;
  padding: 20px 0;
  border-top: 1px solid var(--line-soft);
}
.contact-row:first-child { border-top: none; }
.contact-row .lbl {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-3);
}
.contact-row .val { font-size: 15px; color: var(--ink); }
@media (max-width: 820px) {
  .contact { grid-template-columns: 1fr; gap: 32px; }
}

/* ========== FOOTER ========== */
footer {
  border-top: 1px solid var(--line-soft);
  padding: 60px 0 40px;
  color: var(--ink-2);
  font-size: 13px;
}
.footer-inner {
  display: flex; justify-content: space-between; align-items: center; gap: 24px;
  flex-wrap: wrap;
}
.footer-logo {
  font-family: var(--accent-font);
  font-style: italic;
  font-size: 22px;
  color: var(--ink);
}

/* ========== TWEAKS PANEL ========== */
.tweaks-panel {
  position: fixed;
  bottom: 24px; right: 24px;
  width: 320px;
  max-height: 80vh;
  overflow-y: auto;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
  padding: 20px;
  z-index: 100;
  display: none;
  font-family: var(--font-grotesk);
}
.tweaks-panel.active { display: block; }
.tweaks-panel h3 {
  margin: 0 0 4px;
  font-size: 16px;
  font-weight: 600;
}
.tweaks-panel .sub {
  font-size: 12px; color: var(--ink-3);
  margin-bottom: 16px;
}
.tweak-group {
  margin-bottom: 18px;
}
.tweak-group > label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-3);
  margin-bottom: 8px;
  font-family: var(--font-mono);
}
.tweak-opts {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.tweak-opt {
  padding: 7px 12px;
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 12px;
  cursor: pointer;
  background: transparent;
  color: var(--ink);
  font-family: inherit;
  transition: all .15s;
}
.tweak-opt:hover { border-color: var(--ink-2); }
.tweak-opt.active {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.tweak-swatches { display: flex; gap: 8px; }
.tweak-swatch {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid var(--line);
  cursor: pointer;
  transition: transform .15s;
  padding: 0;
}
.tweak-swatch:hover { transform: scale(1.1); }
.tweak-swatch.active {
  border-color: var(--ink);
  transform: scale(1.1);
}

/* ========== UTILS ========== */
.noise {
  position: absolute; inset: 0;
  pointer-events: none;
  opacity: 0.04;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='a'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%' height='100%' filter='url(%23a)' opacity='0.5'/></svg>");
}

/* Fade-in on load */
.fadein {
  opacity: 0;
  transform: translateY(12px);
  animation: fadein .8s var(--ease-out) forwards;
}
.fadein.d1 { animation-delay: .1s; }
.fadein.d2 { animation-delay: .2s; }
.fadein.d3 { animation-delay: .3s; }
.fadein.d4 { animation-delay: .4s; }
@keyframes fadein {
  to { opacity: 1; transform: translateY(0); }
}

/* ============ Chatbot Component ============ */

.chatbox {
  display: flex; flex-direction: column;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
  position: relative;
  min-height: 560px;
  max-height: 680px;
  font-family: var(--font-grotesk);
}

/* Header */
.chat-head {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--line-soft);
  background: color-mix(in srgb, var(--bg) 50%, var(--surface));
  position: relative;
}
.chat-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blush), var(--accent-2));
  position: relative;
  flex-shrink: 0;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--accent-font);
  font-style: italic;
  color: var(--surface);
  font-size: 20px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.chat-avatar::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 25%, rgba(255,255,255,0.35), transparent 55%);
}
.chat-avatar .online {
  position: absolute; bottom: -2px; right: -2px;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #6AD49B;
  border: 2px solid var(--surface);
  z-index: 2;
}
.chat-who { flex: 1; min-width: 0; }
.chat-who .name {
  font-size: 15px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.chat-who .name .badge {
  font-family: var(--font-mono);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--accent);
  background: var(--accent-3);
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 500;
}
.chat-who .status {
  font-size: 12px; color: var(--ink-3);
  display: flex; align-items: center; gap: 6px;
  margin-top: 2px;
}
.chat-who .status .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #6AD49B;
}
.chat-actions { display: flex; gap: 6px; }
.chat-icon-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: none; background: transparent;
  border-radius: 8px; cursor: pointer;
  color: var(--ink-3);
  transition: background .15s, color .15s;
}
.chat-icon-btn:hover { background: var(--bg-2); color: var(--ink); }

/* Body */
.chat-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex; flex-direction: column;
  gap: 8px;
  scroll-behavior: smooth;
  background:
    radial-gradient(circle at 10% 0%, color-mix(in srgb, var(--blush) 15%, transparent), transparent 40%),
    radial-gradient(circle at 90% 100%, color-mix(in srgb, var(--accent-3) 20%, transparent), transparent 45%),
    var(--surface);
}
.chat-body::-webkit-scrollbar { width: 4px; }
.chat-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

/* Divider (date/status) */
.chat-divider {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--ink-3);
  margin: 16px 0 8px;
  position: relative;
}
.chat-divider::before, .chat-divider::after {
  content: ""; display: inline-block;
  width: 40px; height: 1px;
  background: var(--line-soft);
  vertical-align: middle;
  margin: 0 10px;
}

/* Message bubbles */
.msg {
  display: flex;
  gap: 8px;
  max-width: 88%;
  animation: msgin .35s var(--ease-out);
}
.msg.from-mia { align-self: flex-start; }
.msg.from-user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--blush), var(--accent-2));
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--accent-font);
  font-style: italic;
  color: var(--surface);
  font-size: 13px;
  margin-top: 2px;
}
.msg.from-user .msg-avatar { display: none; }

.msg-bubble {
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 14.5px;
  line-height: 1.45;
  word-wrap: break-word;
}
.msg.from-mia .msg-bubble {
  background: var(--bg-2);
  color: var(--ink);
  border-bottom-left-radius: 6px;
}
.msg.from-user .msg-bubble {
  background: var(--ink);
  color: var(--surface);
  border-bottom-right-radius: 6px;
}
.msg-bubble strong { font-weight: 600; }
.msg-bubble em { font-family: var(--accent-font); font-style: italic; }

@keyframes msgin {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Typing */
.typing {
  align-self: flex-start;
  display: flex; gap: 4px;
  padding: 12px 14px;
  background: var(--bg-2);
  border-radius: 18px;
  border-bottom-left-radius: 6px;
  width: fit-content;
}
.typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ink-3);
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.15s; }
.typing span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-4px); opacity: 1; }
}

/* Quick replies / chips */
.chips {
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 4px 0 4px 36px;
  animation: msgin .4s var(--ease-out);
}
.msg.from-mia + .chips { margin-top: -4px; }
.chip {
  padding: 8px 14px;
  border-radius: 999px;
  background: transparent;
  border: 1px solid var(--line);
  font-size: 13px;
  color: var(--ink);
  cursor: pointer;
  font-family: inherit;
  transition: all .15s;
}
.chip:hover {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent-3) 30%, var(--surface));
}
.chip.primary {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}
.chip.primary:hover { background: var(--accent); border-color: var(--accent); }

/* Service cards inside chat */
.chat-cards {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  padding: 4px 0 4px 36px;
  animation: msgin .4s var(--ease-out);
}
.chat-card {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--line-soft);
  border-radius: 14px;
  cursor: pointer;
  transition: all .15s;
  text-align: left;
  font-family: inherit;
  align-items: center;
}
.chat-card:hover {
  border-color: var(--accent);
  transform: translateY(-1px);
}
.chat-card .cc-name {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 2px;
}
.chat-card .cc-sub {
  font-size: 12px;
  color: var(--ink-3);
}
.chat-card .cc-price {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent);
  font-weight: 500;
}

/* Date picker */
.chat-calendar {
  padding: 4px 0 4px 36px;
  animation: msgin .4s var(--ease-out);
}
.cal-wrap {
  background: var(--surface);
  border: 1px solid var(--line-soft);
  border-radius: 14px;
  padding: 14px;
  max-width: 320px;
}
.cal-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.cal-month {
  font-size: 13px;
  font-weight: 500;
}
.cal-nav {
  display: flex; gap: 4px;
}
.cal-nav button {
  width: 24px; height: 24px;
  background: transparent;
  border: 1px solid var(--line-soft);
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink);
}
.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.cal-day-label, .cal-day {
  aspect-ratio: 1/1;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  border-radius: 6px;
}
.cal-day-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-3);
  text-transform: uppercase;
}
.cal-day {
  cursor: pointer;
  color: var(--ink);
  transition: background .15s;
  background: transparent;
  border: 1px solid transparent;
  font-family: inherit;
}
.cal-day:hover:not(:disabled) { background: var(--bg-2); }
.cal-day.today { border-color: var(--line); }
.cal-day.selected {
  background: var(--ink);
  color: var(--surface);
}
.cal-day.closed {
  color: var(--ink-3);
  text-decoration: line-through;
  cursor: not-allowed;
  opacity: 0.5;
}
.cal-day:disabled { cursor: not-allowed; opacity: 0.3; }

/* Time slots */
.time-slots {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 4px 0 4px 36px;
  max-width: 360px;
  animation: msgin .4s var(--ease-out);
}
.time-slot {
  padding: 10px 8px;
  text-align: center;
  border: 1px solid var(--line-soft);
  background: var(--surface);
  border-radius: 8px;
  font-family: var(--font-mono);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}
.time-slot:hover {
  border-color: var(--accent);
  background: color-mix(in srgb, var(--accent-3) 30%, var(--surface));
}
.time-slot.selected {
  background: var(--ink);
  color: var(--surface);
  border-color: var(--ink);
}

/* Form fields inside chat */
.chat-form {
  padding: 4px 0 4px 36px;
  animation: msgin .4s var(--ease-out);
  max-width: 360px;
}
.chat-input-inline {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--surface);
  font-family: inherit;
  font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color .15s;
}
.chat-input-inline:focus {
  border-color: var(--accent);
}

/* Summary card */
.summary-card {
  padding: 4px 0 4px 36px;
  animation: msgin .4s var(--ease-out);
}
.summary-inner {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px;
  max-width: 360px;
}
.summary-title {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--ink-3);
  margin-bottom: 12px;
}
.summary-row {
  display: flex; justify-content: space-between;
  padding: 8px 0;
  border-top: 1px dashed var(--line-soft);
  font-size: 13px;
}
.summary-row:first-of-type { border-top: none; }
.summary-row .k { color: var(--ink-3); }
.summary-row .v { font-weight: 500; }
.summary-total {
  display: flex; justify-content: space-between;
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--line);
  font-size: 14px;
  font-weight: 600;
}

/* Handoff card - when Mia's team takes over */
.handoff-card {
  padding: 4px 0 4px 36px;
  animation: msgin .4s var(--ease-out);
}
.handoff-inner {
  background: linear-gradient(135deg, color-mix(in srgb, var(--blush) 20%, var(--surface)), var(--surface));
  border: 1px solid var(--blush);
  border-radius: 14px;
  padding: 14px 16px;
  max-width: 360px;
  display: flex; gap: 12px; align-items: flex-start;
}
.handoff-inner .ic {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--blush);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: var(--surface);
}
.handoff-inner .txt { font-size: 13px; color: var(--ink); line-height: 1.5; }
.handoff-inner .txt strong { display: block; margin-bottom: 4px; }

/* Footer input */
.chat-foot {
  padding: 14px 16px;
  border-top: 1px solid var(--line-soft);
  background: var(--surface);
}
.chat-input-row {
  display: flex; gap: 8px; align-items: center;
  background: var(--bg);
  border: 1px solid var(--line-soft);
  border-radius: 999px;
  padding: 4px 4px 4px 18px;
  transition: border-color .15s;
}
.chat-input-row:focus-within { border-color: var(--accent); }
.chat-input {
  flex: 1;
  border: none;
  background: transparent;
  outline: none;
  font-family: inherit;
  font-size: 14px;
  color: var(--ink);
  padding: 10px 0;
}
.chat-input::placeholder { color: var(--ink-3); }
.chat-send {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--ink);
  color: var(--surface);
  border: none;

  for (let i = 0; i < count; i++) {

    d.setDate(today.getDate() + i);
    days.push(d);

}

// ============ HELPER COMPONENTS ============
function MiaMessage({ msg, persona }) {
  // Parse <em> tags for emphasis
  const renderText = (text) => {
    if (!text) return null;
    const parts = text.split(/(<em>.*?<\/em>|\*\*.*?\*\*)/g);
    return parts.map((p, i) => {
      if (p.startsWith('<em>')) return <em key={i}>{p.slice(4, -5)}</em>;
      if (p.startsWith('**')) return <strong key={i}>{p.slice(2, -2)}</strong>;
      return p;
    });
  };
  return (
    <div className={`msg from-${msg.from}`}>
      {msg.from === 'mia' && <div className="msg-avatar">M</div>}
      <div className="msg-bubble">{renderText(msg.text)}</div>
    </div>
  );
}

function InlineForm({ field, placeholder, inputType, onSubmit }) {
  const [v, setV] = useState('');
  const ref = useRef(null);
  useEffect(() => { setTimeout(() => ref.current?.focus(), 100); }, []);
  return (
    <div className="chat-form">
      <input
        ref={ref}
        type={inputType || 'text'}
        className="chat-input-inline"
        placeholder={placeholder}
        value={v}
        onChange={(e) => setV(e.target.value)}
        onKeyDown={(e) => { if (e.key === 'Enter' && v.trim()) onSubmit(v.trim()); }}
      />
    </div>
  );
}

function CalendarPicker({ onPick }) {
  const today = new Date();
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [selected, setSelected] = useState(null);

  const firstDay = new Date(viewYear, viewMonth, 1);
  const lastDay = new Date(viewYear, viewMonth + 1, 0);
  const startPad = firstDay.getDay();
  const totalDays = lastDay.getDate();

  const monthName = firstDay.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const cells = [];
  for (let i = 0; i < startPad; i++) cells.push(null);
  for (let d = 1; d <= totalDays; d++) cells.push(d);

  const isPast = (d) => {
    if (!d) return true;
    const dt = new Date(viewYear, viewMonth, d);
    return dt < new Date(today.getFullYear(), today.getMonth(), today.getDate());
  };
  const isClosed = (d) => {
    if (!d) return false;
    const dt = new Date(viewYear, viewMonth, d);
    return dt.getDay() === 0 || dt.getDay() === 6;
  };
  const isToday = (d) => d === today.getDate() && viewMonth === today.getMonth() && viewYear === today.getFullYear();

  return (
    <div className="chat-calendar">
      <div className="cal-wrap">
        <div className="cal-head">
          <div className="cal-month">{monthName}</div>
          <div className="cal-nav">
            <button onClick={() => {
              const d = new Date(viewYear, viewMonth - 1, 1);
              setViewMonth(d.getMonth()); setViewYear(d.getFullYear());
            }}>‹</button>
            <button onClick={() => {
              const d = new Date(viewYear, viewMonth + 1, 1);
              setViewMonth(d.getMonth()); setViewYear(d.getFullYear());
            }}>›</button>
          </div>
        </div>
        <div className="cal-grid">
          {['S','M','T','W','T','F','S'].map((d, i) => <div key={'l'+i} className="cal-day-label">{d}</div>)}
          {cells.map((d, i) => {
            if (d === null) return <div key={'e'+i}></div>;
            const closed = isClosed(d);
            const past = isPast(d);
            return (
              <button
                key={'d'+i}
                className={`cal-day ${isToday(d) ? 'today' : ''} ${closed ? 'closed' : ''} ${selected === d ? 'selected' : ''}`}
                disabled={past || closed}
                onClick={() => {
                  if (!past && !closed) {
                    setSelected(d);
                    onPick(new Date(viewYear, viewMonth, d));
                  }
                }}
              >
                {d}
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function TileArt({ seed }) {
  const variants = [
    // brow close-up
    <svg key="1" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
      <defs><radialGradient id={`tg${seed}`} cx="50%" cy="50%"><stop offset="0%" stopColor="rgba(255,255,255,0.25)"/><stop offset="100%" stopColor="rgba(255,255,255,0)"/></radialGradient></defs>
      <rect width="100" height="100" fill={`url(#tg${seed})`}/>
      {Array.from({length: 14}).map((_, i) => (
        <line key={i} x1={10 + i * 6} y1={55 + Math.sin(i + seed) * 4} x2={14 + i * 6} y2={48 + Math.sin(i + seed) * 4} stroke="rgba(20,12,8,0.7)" strokeWidth="1.4" strokeLinecap="round"/>
      ))}
    </svg>,
    // lip close-up
    <svg key="2" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
      <path d="M 20 50 Q 35 40 50 48 Q 65 40 80 50 Q 65 62 50 58 Q 35 62 20 50 Z" fill="rgba(190,100,90,0.6)"/>
      <path d="M 20 50 Q 50 55 80 50" stroke="rgba(140,60,50,0.7)" strokeWidth="1.2" fill="none"/>
    </svg>,
    // geometric abstraction
    <svg key="3" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
      <circle cx="50" cy="50" r="30" fill="none" stroke="rgba(255,255,255,0.35)" strokeWidth="1"/>
      <circle cx="50" cy="50" r="20" fill="rgba(255,255,255,0.15)"/>
    </svg>,
  ];
  return variants[seed % variants.length];
}

// Tweaks.jsx — in-page tweaks panel

const { useState: useTState, useEffect: useTEffect } = React;

function TweaksPanel({ tweaks, setTweaks, active }) {
  if (!active) return null;

  const update = (key, value) => {
    const next = { ...tweaks, [key]: value };
    setTweaks(next);
    // Persist to disk
    window.parent?.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
  };

  const Section = ({ label, children }) => (
    <div className="tweak-group">
      <label>{label}</label>
      <div className="tweak-opts">{children}</div>
    </div>
  );

  const Opt = ({ k, v, cur, children }) => (
    <button className={`tweak-opt ${cur === v ? 'active' : ''}`} onClick={() => update(k, v)}>
      {children || v}
    </button>
  );

  const Swatch = ({ k, v, cur, color }) => (
    <button
      className={`tweak-swatch ${cur === v ? 'active' : ''}`}
      onClick={() => update(k, v)}
      style={{ background: color }}
      title={v}
    />
  );

  return (
    <div className="tweaks-panel active">
      <h3>Tweaks</h3>
      <div className="sub">Toggle the design in real time</div>

      <div className="tweak-group">
        <label>Palette</label>
        <div className="tweak-swatches">
          <Swatch k="palette" v="ocean" cur={tweaks.palette} color="linear-gradient(135deg,#F6D9C8,#7FA0AC)"/>
          <Swatch k="palette" v="blush" cur={tweaks.palette} color="linear-gradient(135deg,#FBDCCB,#C76A55)"/>
          <Swatch k="palette" v="noir" cur={tweaks.palette} color="linear-gradient(135deg,#2A1F18,#D4A25E)"/>
          <Swatch k="palette" v="sage" cur={tweaks.palette} color="linear-gradient(135deg,#D8E0CE,#3E5240)"/>
          <Swatch k="palette" v="sand" cur={tweaks.palette} color="linear-gradient(135deg,#EBD5AD,#6A4422)"/>
        </div>
      </div>

      <Section label="Chat Placement">
        <Opt k="placement" v="hero" cur={tweaks.placement}>Hero</Opt>
        <Opt k="placement" v="docked" cur={tweaks.placement}>Docked</Opt>
        <Opt k="placement" v="drawer" cur={tweaks.placement}>Drawer</Opt>
        <Opt k="placement" v="sidebar" cur={tweaks.placement}>Sidebar</Opt>
        <Opt k="placement" v="fullscreen" cur={tweaks.placement}>Full-screen</Opt>
      </Section>

      <Section label="Hero Layout">
        <Opt k="hero" v="split" cur={tweaks.hero}>Split</Opt>
        <Opt k="hero" v="full-bleed" cur={tweaks.hero}>Centered</Opt>
        <Opt k="hero" v="ambient" cur={tweaks.hero}>Ambient</Opt>
      </Section>

      <Section label="Chatbot Voice">
        <Opt k="persona" v="mia" cur={tweaks.persona}>Mia</Opt>
        <Opt k="persona" v="concierge" cur={tweaks.persona}>Concierge</Opt>
        <Opt k="persona" v="clinical" cur={tweaks.persona}>Clinical</Opt>
        <Opt k="persona" v="quiet" cur={tweaks.persona}>Quiet</Opt>
      </Section>

      <Section label="Booking Flow">
        <Opt k="flow" v="conversational" cur={tweaks.flow}>Conversational</Opt>
        <Opt k="flow" v="fast" cur={tweaks.flow}>Fast</Opt>
      </Section>

      <Section label="Typography">
        <Opt k="type" v="grotesk" cur={tweaks.type}>Grotesk</Opt>
        <Opt k="type" v="serif-mix" cur={tweaks.type}>Serif Mix</Opt>
        <Opt k="type" v="mono-accent" cur={tweaks.type}>Mono Accent</Opt>
      </Section>

      <Section label="Density">
        <Opt k="density" v="airy" cur={tweaks.density}>Airy</Opt>
        <Opt k="density" v="compact" cur={tweaks.density}>Compact</Opt>
      </Section>
    </div>
  );
}

window.TweaksPanel = TweaksPanel;

</script>

<script type="text/babel" data-presets="react">
const { useState: useAState, useEffect: useAEffect, useRef: useARef, useCallback: useACallback } = React;

function App() {
  const Chatbot = window.Chatbot;
  const TweaksPanel = window.TweaksPanel;
  const [tweaks, setTweaks] = useAState(window.__TWEAK_DEFAULTS);
  const [editActive, setEditActive] = useAState(false);
  const [chatCollapsed, setChatCollapsed] = useAState(false);
  const chatRef = useARef(null);

  // Apply tweaks to <html>
  useAEffect(() => {
    const root = document.documentElement;
    Object.entries(tweaks).forEach(([k, v]) => root.setAttribute(`data-${k}`, v));
  }, [tweaks]);

  // Edit-mode protocol
  useAEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditActive(true);
      else if (e.data?.type === '__deactivate_edit_mode') setEditActive(false);
    };
    window.addEventListener('message', handler);
    window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  // Auto-expand chat when placement changes
  useAEffect(() => {
    setChatCollapsed(false);
  }, [tweaks.placement]);

  // Toggle collapsed state
  useAEffect(() => {
    if (chatCollapsed) document.documentElement.classList.add('chat-collapsed');
    else document.documentElement.classList.remove('chat-collapsed');
  }, [chatCollapsed]);

  const scrollToChat = () => {
    if (tweaks.placement === 'hero' || tweaks.placement === 'fullscreen') {
      document.querySelector('.hero')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
      setChatCollapsed(false);
    }
  };

  const handleAskMia = (question) => {
    // Dispatch a custom event that Chatbot picks up
    window.dispatchEvent(new CustomEvent('ask-mia', { detail: question }));
    scrollToChat();
  };

  const handleAskAboutService = (serviceName) => {
    window.dispatchEvent(new CustomEvent('ask-mia', { detail: `Tell me about ${serviceName}.` }));
    scrollToChat();
  };

  const { Sections: S } = window;

  return (
    <div className="page">
      {/* NAV */}

          </a>
          <div className="nav-links">
            <a href="#services">Services</a>
            <a href="#about">About Mia</a>
            <a href="https://www.instagram.com/miamin_ny/" target="_blank" rel="noopener">Gallery</a>
            <a href="#faq">FAQ</a>
            <a href="#contact">Visit</a>
          </div>
          <button className="nav-cta" onClick={scrollToChat}>
            <span className="pulse"></span>
            Book with Mia
          </button>
        </div>
      </nav>

      <main className="page-main">

      {/* HERO */}
      <section className="hero" data-screen-label="01 Hero">
        <div className="hero-blobs">
          <div className="blob blob-1"></div>
          <div className="blob blob-2"></div>
          <div className="blob blob-3"></div>
        </div>
        <div className="container">
          <div className="hero-inner">
            <div className="hero-text">
              <div>
                <div className="eyebrow fadein">Est. 2017 · Midtown NYC</div>
                <h1 className="display fadein d1">
                  Beauty of People<br/>
                  is in the <em>Work.</em>
                </h1>
                <p className="hero-sub fadein d2">
                  Providing the highest level of service and skill in all that we do. We want everyone who comes through our doors to know and feel they are in the best hands, supported and cared for in every aspect.
                </p>
              </div>
              <div className="hero-meta fadein d3">
                <div className="stat">
                  <div className="num">1,000<sup style={{fontSize: '0.5em'}}>+</sup></div>
                  <div className="lbl">Procedures</div>
                </div>
                <div className="stat">
                  <div className="num">8 yrs</div>
                  <div className="lbl">In practice</div>
                </div>
                <div className="stat">
                  <div className="num serif-italic" style={{color: '#fff'}}>Natural</div>
                  <div className="lbl">By philosophy</div>
                </div>
              </div>
            </div>

            {/* Right column: chat (when placement=hero) OR visual (when chat is elsewhere) */}
            {tweaks.placement === 'hero' && tweaks.hero !== 'full-bleed' && tweaks.hero !== 'ambient' && (
              <div className="hero-chat-wrap fadein d2" ref={chatRef}>
                <Chatbot
                  key={tweaks.persona + '-' + tweaks.flow}
                  persona={tweaks.persona}
                  flow={tweaks.flow}
                  placement={tweaks.placement}
                />
              </div>
            )}
            {tweaks.placement !== 'hero' && tweaks.placement !== 'sidebar' && tweaks.hero !== 'full-bleed' && tweaks.hero !== 'ambient' && <S.HeroVisual/>}
          </div>
        </div>

        {/* Floating chat (docked/drawer/fullscreen) */}
        {tweaks.placement !== 'hero' && tweaks.placement !== 'sidebar' && (
          <div className="hero-chat-wrap fadein d2" ref={chatRef}>
            {tweaks.placement === 'docked' && (
              <button className="dock-bubble" onClick={() => setChatCollapsed(false)}>
                <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
                  <path d="M4 6C4 4.9 4.9 4 6 4H20C21.1 4 22 4.9 22 6V16C22 17.1 21.1 18 20 18H10L6 22V18C4.9 18 4 17.1 4 16V6Z" stroke="white" strokeWidth="1.5" fill="none"/>
                </svg>
              </button>
            )}
            {tweaks.placement === 'drawer' && (
              <button className="drawer-tab" onClick={() => setChatCollapsed(false)}>
                Ask Mia ✦
              </button>
            )}
            <Chatbot
              key={tweaks.persona + '-' + tweaks.flow}
              persona={tweaks.persona}
              flow={tweaks.flow}
              placement={tweaks.placement}
              onMinimize={(tweaks.placement === 'docked' || tweaks.placement === 'drawer') ? () => setChatCollapsed(true) : null}
            />
          </div>
        )}
        <div style={{display:'none'}}>{/* spacer */}</div>
      </section>

      {/* SERVICES */}
      <S.Services onAskAboutService={handleAskAboutService}/>

      {/* PROCESS */}
      <S.Process/>

      {/* ABOUT */}
      <S.About/>

      {/* GALLERY */}
      <S.Gallery/>

      {/* FAQ */}
      <S.FAQ onAskMia={handleAskMia}/>

      {/* CONTACT */}
      <S.Contact/>

      </main>

      {/* Sidebar chat (always visible, sticky right column) */}
      {tweaks.placement === 'sidebar' && (
        <aside className="sidebar-chat-wrap fadein d2" ref={chatRef}>
          <Chatbot
            key={tweaks.persona + '-' + tweaks.flow}
            persona={tweaks.persona}
            flow={tweaks.flow}
            placement={tweaks.placement}
          />
        </aside>
      )}

      {/* FOOTER */}
      <footer>
        <div className="container footer-inner">
          <div className="footer-logo">Mia Min Beauty</div>
          <div>315 5th Ave, #605 · New York, NY 10016 · 347-244-9608</div>
          <div style={{fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.15em', textTransform: 'uppercase', color: 'var(--ink-3)'}}>
            © 2026 · AI-assisted, human-finished
          </div>
        </div>
      </footer>

      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} active={editActive}/>
    </div>
  );
}

window.App = App;
// Wait a tick so Chatbot/Sections/Tweaks window exports are ready
setTimeout(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}, 50);
</script>

</body>
</html>
